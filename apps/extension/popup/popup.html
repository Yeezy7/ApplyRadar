<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- 未登录 -->
    <div id="login-view" class="view" style="display:none">
      <div class="header">
        <div class="header-center">
          <img src="../icons/icon48.png" alt="" class="logo">
          <h1>ApplyRadar</h1>
          <p class="subtitle">求职状态自动跟踪</p>
        </div>
      </div>
      <div class="login-form">
        <div class="input-group">
          <label>邮箱</label>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="email" />
        </div>
        <div class="input-group">
          <label>密码</label>
          <input type="password" id="password" placeholder="••••••" autocomplete="current-password" />
        </div>
        <button id="login-btn" class="btn btn-primary btn-full">登录</button>
        <div id="login-error" class="error"></div>
      </div>
    </div>

    <!-- 已登录 -->
    <div id="main-view" class="view" style="display:none">
      <div class="header">
        <div class="header-row">
          <div class="header-left">
            <img src="../icons/icon48.png" alt="" class="logo-sm">
            <span class="title">ApplyRadar</span>
          </div>
          <div class="header-right">
            <button id="sync-all-btn" class="header-btn" title="同步全部">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.22-8.56"/><path d="M21 3v5h-5"/></svg>
            </button>
            <button id="settings-btn" class="header-btn" title="设置">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 当前页面卡片 -->
      <div id="current-page" class="page-card" style="display:none">
        <div class="page-card-content">
          <div class="page-card-info">
            <div class="page-card-domain" id="page-domain"></div>
            <div class="page-card-status" id="page-status"></div>
          </div>
          <button id="page-action-btn" class="btn btn-sm"></button>
        </div>
      </div>

      <!-- Tab 切换 -->
      <div class="tabs">
        <button class="tab active" data-tab="targets">追踪目标</button>
        <button class="tab" data-tab="domains">监控域名</button>
        <button class="tab" data-tab="cookies">Cookie</button>
      </div>

      <!-- Tab: 追踪目标 -->
      <div class="tab-content active" data-tab="targets">
        <div id="target-list" class="list"></div>
      </div>

      <!-- Tab: 监控域名 -->
      <div class="tab-content" data-tab="domains">
        <div class="list-header">
          <span class="list-count" id="domain-count">0 个域名</span>
          <button id="add-domain-btn" class="btn btn-xs">+ 添加</button>
        </div>
        <div id="domain-list" class="list"></div>
      </div>

      <!-- Tab: Cookie -->
      <div class="tab-content" data-tab="cookies">
        <div id="cookie-info" class="cookie-info"></div>
      </div>

      <!-- 底部状态 -->
      <div class="footer">
        <span id="footer-status">就绪</span>
      </div>
    </div>

    <!-- 添加域名弹窗 -->
    <div id="modal-overlay" class="modal-overlay" style="display:none">
      <div class="modal">
        <div class="modal-header">
          <h3>添加监控域名</h3>
          <button id="modal-close" class="modal-close-btn">×</button>
        </div>
        <div class="modal-body">
          <div class="input-group">
            <label>域名</label>
            <input type="text" id="modal-domain-input" placeholder="dfmc.hotjob.cn" />
          </div>
          <div class="modal-hint">输入招聘网站域名，扩展会自动同步该域名的 Cookie</div>
        </div>
        <div class="modal-footer">
          <button id="modal-cancel" class="btn btn-ghost">取消</button>
          <button id="modal-confirm" class="btn btn-primary">添加</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
